<script>
  (function () {
    var grids = document.querySelectorAll('.gallery-photo-grid');
    if (!grids.length) return;

    var overlay = document.createElement('div');
    overlay.className = 'lightbox-overlay';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-hidden', 'true');

    var lightboxImg = document.createElement('img');
    overlay.appendChild(lightboxImg);

    var closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'lightbox-close';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.textContent = '\u00D7';
    overlay.appendChild(closeBtn);

    document.body.appendChild(overlay);

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || '';
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      overlay.classList.remove('is-open');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    grids.forEach(function (grid) {
      grid.querySelectorAll('img').forEach(function (image) {
        image.addEventListener('click', function () {
          openLightbox(image.currentSrc || image.src, image.alt);
        });
      });
    });

    overlay.addEventListener('click', closeLightbox);
    closeBtn.addEventListener('click', function (event) {
      event.stopPropagation();
      closeLightbox();
    });
    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') closeLightbox();
    });
  })();

  (function () {
    var toggle = document.getElementById('nav-toggle');
    if (!toggle) return;

    function closeMenuInstant() {
      var header = document.querySelector('.site-header');
      if (header) header.classList.add('nav-closing');
      toggle.checked = false;
      // Allow transitions again after paint if we stayed on this page
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          if (header) header.classList.remove('nav-closing');
        });
      });
    }

    document.querySelectorAll('.site-nav a').forEach(function (link) {
      link.addEventListener('click', function () {
        var dest = link.pathname.replace(/\/$/, '') || '/';
        var here = window.location.pathname.replace(/\/$/, '') || '/';
        // Leaving the page: keep menu open so the icon doesn't animate mid-navigation
        if (dest !== here) return;
        closeMenuInstant();
      });
    });
  })();

  (function () {
    var form = document.getElementById('inquiry-form');
    if (!form) return;

    var submitBtn = form.querySelector('.inquiry-submit');
    var statusEl = form.querySelector('.inquiry-status');
    var phoneEl = form.querySelector('#inquiry-phone');
    var guestsEl = form.querySelector('#inquiry-guests');
    var budgetEl = form.querySelector('#inquiry-budget');
    var dateEl = form.querySelector('#inquiry-event-date');
    var defaultLabel = submitBtn ? submitBtn.textContent : '';

    function setStatus(message, kind) {
      if (!statusEl) return;
      statusEl.hidden = !message;
      statusEl.textContent = message || '';
      statusEl.classList.remove('is-error', 'is-success');
      if (kind) statusEl.classList.add(kind);
    }

    function firstInvalid() {
      return form.querySelector(':invalid');
    }

    function digitsOnly(value) {
      return String(value || '').replace(/\D/g, '');
    }

    function validatePhone() {
      if (!phoneEl) return true;
      var value = phoneEl.value.trim();
      if (!value) {
        phoneEl.setCustomValidity('');
        return true;
      }
      var digits = digitsOnly(value);
      if (digits.length < 10 || digits.length > 15 || /[a-zA-Z]/.test(value)) {
        phoneEl.setCustomValidity('Enter a valid phone number with at least 10 digits.');
        return false;
      }
      phoneEl.setCustomValidity('');
      return true;
    }

    function validateGuests() {
      if (!guestsEl) return true;
      var value = guestsEl.value.trim();
      if (!value) {
        guestsEl.setCustomValidity('');
        return true;
      }
      if (!/^\d+$/.test(value) || Number(value) < 1 || Number(value) > 10000) {
        guestsEl.setCustomValidity('Enter a whole number of guests between 1 and 10,000.');
        return false;
      }
      guestsEl.setCustomValidity('');
      return true;
    }

    function validateBudget() {
      if (!budgetEl) return true;
      var value = budgetEl.value.trim();
      if (!value) {
        budgetEl.setCustomValidity('');
        return true;
      }
      if (!/^\d+(\.\d{1,2})?$/.test(value) || Number(value) < 0) {
        budgetEl.setCustomValidity('Enter a dollar amount using numbers only.');
        return false;
      }
      budgetEl.setCustomValidity('');
      return true;
    }

    function validateDate() {
      if (!dateEl) return true;
      var value = dateEl.value.trim();
      if (!value) {
        dateEl.setCustomValidity('');
        return true;
      }
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value) || Number.isNaN(Date.parse(value))) {
        dateEl.setCustomValidity('Choose a date from the date picker.');
        return false;
      }
      dateEl.setCustomValidity('');
      return true;
    }

    function validateSpecialFields() {
      return validatePhone() && validateGuests() && validateBudget() && validateDate();
    }

    if (phoneEl) {
      phoneEl.addEventListener('beforeinput', function (event) {
        if (event.inputType && event.inputType.indexOf('insert') === 0 && event.data && /[a-zA-Z]/.test(event.data)) {
          event.preventDefault();
        }
      });
      phoneEl.addEventListener('input', function () {
        var cleaned = phoneEl.value.replace(/[^\d+\s().-]/g, '');
        if (cleaned !== phoneEl.value) phoneEl.value = cleaned;
        validatePhone();
      });
    }

    if (guestsEl) {
      guestsEl.addEventListener('beforeinput', function (event) {
        if (event.inputType && event.inputType.indexOf('insert') === 0 && event.data && /\D/.test(event.data)) {
          event.preventDefault();
        }
      });
      guestsEl.addEventListener('input', validateGuests);
    }

    if (budgetEl) {
      budgetEl.addEventListener('beforeinput', function (event) {
        if (event.inputType && event.inputType.indexOf('insert') === 0 && event.data && /[^0-9.]/.test(event.data)) {
          event.preventDefault();
        }
      });
      budgetEl.addEventListener('input', validateBudget);
    }

    if (dateEl) dateEl.addEventListener('input', validateDate);

    form.addEventListener('input', function (event) {
      var field = event.target;
      if (!field || !field.matches || !field.matches('.inquiry-input')) return;
      if (field.validity.valid) field.removeAttribute('aria-invalid');
    });

    form.addEventListener('invalid', function (event) {
      var field = event.target;
      if (!field || !field.matches || !field.matches('.inquiry-input')) return;
      field.setAttribute('aria-invalid', 'true');
    }, true);

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      setStatus('', null);
      form.classList.add('is-validated');
      validateSpecialFields();

      if (!form.checkValidity()) {
        form.reportValidity();
        var bad = firstInvalid();
        if (bad && typeof bad.focus === 'function') bad.focus();
        setStatus('Please fill in the required fields and correct any errors.', 'is-error');
        return;
      }

      var data = new FormData(form);
      var services = data.getAll('services').filter(Boolean);
      var guestRaw = String(data.get('guestCount') || '').trim();
      var budgetRaw = String(data.get('budget') || '').trim();
      var payload = {
        website: String(data.get('website') || ''),
        name: String(data.get('name') || '').trim(),
        partnerName: String(data.get('partnerName') || '').trim(),
        email: String(data.get('email') || '').trim(),
        phone: String(data.get('phone') || '').trim(),
        eventType: String(data.get('eventType') || '').trim(),
        eventDate: String(data.get('eventDate') || '').trim(),
        venue: String(data.get('venue') || '').trim(),
        cityState: String(data.get('cityState') || '').trim(),
        mailingAddress: String(data.get('mailingAddress') || '').trim(),
        guestCount: guestRaw,
        budget: budgetRaw ? ('$' + Number(budgetRaw).toLocaleString('en-US')) : '',
        services: services,
        message: String(data.get('message') || '').trim(),
        referralSource: String(data.get('referralSource') || '').trim(),
        formPage: window.location.pathname.replace(/\/$/, '') || '/',
      };

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.setAttribute('aria-busy', 'true');
        submitBtn.textContent = 'Sending…';
      }

      fetch('/api/inquiry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      })
        .then(function (res) {
          return res.json().then(function (json) {
            return { ok: res.ok && json && json.ok, json: json };
          });
        })
        .then(function (result) {
          if (!result.ok) {
            throw new Error((result.json && result.json.error) || 'Something went wrong');
          }

          if (typeof gtag === 'function') {
            gtag('event', 'generate_lead', {
              form_id: 'inquiry_form',
              form_page: payload.formPage,
              event_type: payload.eventType,
            });
          }

          form.reset();
          form.classList.remove('is-validated');
          form.querySelectorAll('[aria-invalid]').forEach(function (el) {
            el.removeAttribute('aria-invalid');
          });
          setStatus("Thank you — I've received your inquiry and will be in touch within 1–2 business days.", 'is-success');
          if (statusEl && typeof statusEl.focus === 'function') statusEl.focus();
        })
        .catch(function () {
          setStatus('Sorry, we could not send your inquiry. Please try again or email events@ivesandivory.com.', 'is-error');
        })
        .finally(function () {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.removeAttribute('aria-busy');
            submitBtn.textContent = defaultLabel;
          }
        });
    });
  })();
</script>
